[functions]
directory = "netlify/functions"

[[plugins]]
package = "@netlify/plugin-lighthouse"

[[plugins.inputs.audits]]
path = "projects/"
output_path = "reports/lighthouse-projects.html"

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Cross-Origin-Opener-Policy = "same-origin"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
Content-Security-Policy = "default-src 'self'; script-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://api.netlify.com https://badge.fury.io https://d25lcipzij17d.cloudfront.net https://img.shields.io https://github.com https://raw.githubusercontent.com https://github-production-user-asset-6210df.s3.amazonaws.com https://*.githubusercontent.com; media-src 'self' https://github.com https://raw.githubusercontent.com https://github-production-user-asset-6210df.s3.amazonaws.com https://*.githubusercontent.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'none'; require-trusted-types-for 'script';"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

[[headers]]
for = "/*/index.html"
[headers.values]
Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

[[headers]]
for = "/*/*/index.html"
[headers.values]
Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

[[headers]]
for = "/media/projects/*.mp4"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/media/projects/*.webm"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Redirects for legacy portfolio routes to support old links
[[redirects]]
from = "/portfolio"
to = "/projects"
status = 301
force = true

[[redirects]]
from = "/portfolio/*"
to = "/projects/:splat"
status = 301
force = true

[[redirects]]
from = "/projects/sealed-vote-web"
to = "/projects/sealed-vote/"
status = 301
force = true

[[redirects]]
from = "/projects/sealed-vote-web/"
to = "/projects/sealed-vote/"
status = 301
force = true

# Contact routes
[[redirects]]
from = "/linkedin"
to = "https://www.linkedin.com/in/ppiech"
status = 301

[[redirects]]
from = "/github"
to = "https://github.com/Tenemo"
status = 301

[[redirects]]
from = "/telegram"
to = "https://t.me/tenemo"
status = 301

[[redirects]]
from = "/discord"
to = "https://discord.com/users/297930621760831488"
status = 301

# 404 redirects
[[redirects]]
from = "/:path"
to = "/"
status = 301

[[redirects]]
from = "/:path/"
to = "/"
status = 301

[[redirects]]
from = "/:path/*"
to = "/"
status = 301

[[redirects]]
from = "/index.html"
to = "/"
status = 301
