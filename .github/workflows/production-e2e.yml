name: Production Playwright E2E

on:
    workflow_dispatch:
        inputs:
            base_url:
                description: Production site URL to test
                required: false
                default: 'https://piech.dev'
                type: string
    repository_dispatch:
        types: [production_e2e]

permissions:
    contents: read

concurrency:
    group: production-playwright-e2e
    cancel-in-progress: false

jobs:
    resolve_config:
        name: Resolve Production Playwright config
        runs-on: ubuntu-latest
        outputs:
            runner_label: ${{ steps.config.outputs.runner_label }}
            workers: ${{ steps.config.outputs.workers }}
            max_parallel: ${{ steps.config.outputs.max_parallel }}
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Use Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: '22.x'

            - name: Read Playwright workflow config
              id: config
              run: node --experimental-strip-types .github/scripts/readPlaywrightWorkflowConfig.ts production >> "$GITHUB_OUTPUT"

    playwright:
        name: Production Playwright E2E (${{ matrix.project.name }})
        needs: resolve_config
        runs-on: ${{ needs.resolve_config.outputs.runner_label }}
        timeout-minutes: 30
        strategy:
            fail-fast: false
            max-parallel: ${{ fromJSON(needs.resolve_config.outputs.max_parallel) }}
            matrix:
                project:
                    - name: Desktop Chrome
                      slug: desktop-chrome
                      browser: chromium
                    - name: Desktop Chrome Invariant
                      slug: desktop-chrome-invariant
                      browser: chromium
                    - name: Desktop Firefox
                      slug: desktop-firefox
                      browser: firefox
                    - name: Desktop Safari
                      slug: desktop-safari
                      browser: webkit
                    - name: Mobile Chrome (Galaxy S24)
                      slug: mobile-chrome-galaxy-s24
                      browser: chromium
                    - name: Mobile Safari (iPhone 15)
                      slug: mobile-safari-iphone-15
                      browser: webkit
                    - name: Mobile Firefox (Galaxy S24)
                      slug: mobile-firefox-galaxy-s24
                      browser: firefox
        env:
            PLAYWRIGHT_BLOB_REPORT: 'true'
            PLAYWRIGHT_REMOTE_CI_WORKERS: ${{ needs.resolve_config.outputs.workers }}
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Use Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: '22.x'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Resolve production E2E context
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  INPUT_BASE_URL: ${{ inputs.base_url }}
                  PAYLOAD_BASE_URL: ${{ github.event.client_payload.base_url }}
                  PAYLOAD_DEPLOY_BRANCH: ${{ github.event.client_payload.deploy_branch }}
                  PAYLOAD_DEPLOY_CONTEXT: ${{ github.event.client_payload.deploy_context }}
                  PAYLOAD_DEPLOY_ID: ${{ github.event.client_payload.deploy_id }}
                  PAYLOAD_DEPLOY_URL: ${{ github.event.client_payload.deploy_url }}
                  PAYLOAD_PUBLISHED_URL: ${{ github.event.client_payload.published_url }}
              run: |
                  if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                    base_url="${INPUT_BASE_URL:-https://piech.dev}"
                    deploy_branch=""
                    deploy_context=""
                    deploy_id=""
                    deploy_url=""
                    published_url=""
                  else
                    base_url="${PAYLOAD_BASE_URL:-https://piech.dev}"
                    deploy_branch="${PAYLOAD_DEPLOY_BRANCH:-}"
                    deploy_context="${PAYLOAD_DEPLOY_CONTEXT:-}"
                    deploy_id="${PAYLOAD_DEPLOY_ID:-}"
                    deploy_url="${PAYLOAD_DEPLOY_URL:-}"
                    published_url="${PAYLOAD_PUBLISHED_URL:-}"
                  fi

                  {
                    echo "PLAYWRIGHT_BASE_URL=$base_url"
                    echo "PRODUCTION_E2E_DEPLOY_BRANCH=$deploy_branch"
                    echo "PRODUCTION_E2E_DEPLOY_CONTEXT=$deploy_context"
                    echo "PRODUCTION_E2E_DEPLOY_ID=$deploy_id"
                    echo "PRODUCTION_E2E_DEPLOY_URL=$deploy_url"
                    echo "PRODUCTION_E2E_PUBLISHED_URL=$published_url"
                  } >> "$GITHUB_ENV"

            - name: Cache Playwright browsers
              id: playwright-browser-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ matrix.project.browser }}-${{ hashFiles('package-lock.json') }}

            - name: Install Playwright browser
              run: npx playwright install --with-deps ${{ matrix.project.browser }}

            - name: Run Playwright tests against production
              run: npx playwright test --project "${{ matrix.project.name }}"

            - name: Upload Playwright blob report
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: production-playwright-blob-report-${{ matrix.project.slug }}
                  path: blob-report/
                  if-no-files-found: ignore

            - name: Upload Playwright raw results
              if: failure()
              uses: actions/upload-artifact@v6
              with:
                  name: production-playwright-test-results-${{ matrix.project.slug }}
                  path: test-results/
                  if-no-files-found: ignore

    merge-production-playwright-report:
        if: always()
        needs: [resolve_config, playwright]
        name: Merge Production Playwright report
        runs-on: ubuntu-latest
        steps:
            - name: Resolve production E2E context
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  INPUT_BASE_URL: ${{ inputs.base_url }}
                  PAYLOAD_BASE_URL: ${{ github.event.client_payload.base_url }}
                  PAYLOAD_DEPLOY_BRANCH: ${{ github.event.client_payload.deploy_branch }}
                  PAYLOAD_DEPLOY_CONTEXT: ${{ github.event.client_payload.deploy_context }}
                  PAYLOAD_DEPLOY_ID: ${{ github.event.client_payload.deploy_id }}
                  PAYLOAD_DEPLOY_URL: ${{ github.event.client_payload.deploy_url }}
                  PAYLOAD_PUBLISHED_URL: ${{ github.event.client_payload.published_url }}
              run: |
                  if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                    base_url="${INPUT_BASE_URL:-https://piech.dev}"
                    deploy_branch=""
                    deploy_context=""
                    deploy_id=""
                    deploy_url=""
                    published_url=""
                  else
                    base_url="${PAYLOAD_BASE_URL:-https://piech.dev}"
                    deploy_branch="${PAYLOAD_DEPLOY_BRANCH:-}"
                    deploy_context="${PAYLOAD_DEPLOY_CONTEXT:-}"
                    deploy_id="${PAYLOAD_DEPLOY_ID:-}"
                    deploy_url="${PAYLOAD_DEPLOY_URL:-}"
                    published_url="${PAYLOAD_PUBLISHED_URL:-}"
                  fi

                  {
                    echo "PLAYWRIGHT_BASE_URL=$base_url"
                    echo "PRODUCTION_E2E_DEPLOY_BRANCH=$deploy_branch"
                    echo "PRODUCTION_E2E_DEPLOY_CONTEXT=$deploy_context"
                    echo "PRODUCTION_E2E_DEPLOY_ID=$deploy_id"
                    echo "PRODUCTION_E2E_DEPLOY_URL=$deploy_url"
                    echo "PRODUCTION_E2E_PUBLISHED_URL=$published_url"
                  } >> "$GITHUB_ENV"

            - name: Capture deploy metadata
              run: |
                  {
                    echo "## Production deploy under test"
                    echo ""
                    echo "- Base URL: $PLAYWRIGHT_BASE_URL"
                    echo "- Netlify deploy ID: $PRODUCTION_E2E_DEPLOY_ID"
                    echo "- Netlify deploy branch: $PRODUCTION_E2E_DEPLOY_BRANCH"
                    echo "- Netlify deploy context: $PRODUCTION_E2E_DEPLOY_CONTEXT"
                    echo "- Netlify deploy URL: $PRODUCTION_E2E_DEPLOY_URL"
                    echo "- Netlify published URL: $PRODUCTION_E2E_PUBLISHED_URL"
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Skip merged report on green matrix
              if: needs.playwright.result == 'success'
              run: echo "Skipping merged Playwright HTML report because all production matrix jobs passed."

            - name: Checkout
              if: needs.playwright.result != 'success'
              uses: actions/checkout@v5

            - name: Use Node.js
              if: needs.playwright.result != 'success'
              uses: actions/setup-node@v5
              with:
                  node-version: '22.x'
                  cache: 'npm'

            - name: Install dependencies
              if: needs.playwright.result != 'success'
              run: npm ci

            - name: Download Playwright blob reports
              if: needs.playwright.result != 'success'
              uses: actions/download-artifact@v5
              with:
                  merge-multiple: true
                  path: production-blob-reports
                  pattern: production-playwright-blob-report-*

            - name: Merge Playwright HTML report
              if: needs.playwright.result != 'success'
              run: npx playwright merge-reports --reporter html ./production-blob-reports

            - name: Upload merged Playwright HTML report
              if: needs.playwright.result != 'success'
              uses: actions/upload-artifact@v6
              with:
                  name: production-playwright-report
                  path: playwright-report/
                  if-no-files-found: ignore
