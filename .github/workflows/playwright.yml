name: Playwright E2E

on:
    pull_request:
    merge_group:

permissions:
    contents: read

jobs:
    playwright:
        name: Playwright E2E (${{ matrix.project.name }}, shard ${{ matrix.shard }}/2)
        runs-on: ubuntu-latest
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                project:
                    - name: Desktop Chrome
                      slug: desktop-chrome
                      browser: chromium
                    - name: Desktop Firefox
                      slug: desktop-firefox
                      browser: firefox
                    - name: Desktop Safari
                      slug: desktop-safari
                      browser: webkit
                    - name: Mobile Chrome (Galaxy S24)
                      slug: mobile-chrome-galaxy-s24
                      browser: chromium
                    - name: Mobile Safari (iPhone 15)
                      slug: mobile-safari-iphone-15
                      browser: webkit
                    - name: Mobile Firefox (Galaxy S24)
                      slug: mobile-firefox-galaxy-s24
                      browser: firefox
                shard: [1, 2]
        env:
            PLAYWRIGHT_BLOB_REPORT: 'true'
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Use Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: '22.x'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browser
              run: npx playwright install --with-deps ${{ matrix.project.browser }}

            - name: Build production output
              env:
                  GH_TOKEN: ${{ github.token }}
              run: npm run build:skip

            - name: Run Playwright tests
              run: npx playwright test --project "${{ matrix.project.name }}" --shard ${{ matrix.shard }}/2

            - name: Upload Playwright blob report
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: playwright-blob-report-${{ matrix.project.slug }}-shard-${{ matrix.shard }}
                  path: blob-report/
                  if-no-files-found: ignore

            - name: Upload Playwright raw results
              if: failure()
              uses: actions/upload-artifact@v6
              with:
                  name: playwright-test-results-${{ matrix.project.slug }}-shard-${{ matrix.shard }}
                  path: test-results/
                  if-no-files-found: ignore

    merge-playwright-report:
        if: always()
        needs: playwright
        name: Merge Playwright report
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Use Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: '22.x'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Download Playwright blob reports
              uses: actions/download-artifact@v5
              with:
                  merge-multiple: true
                  path: all-blob-reports
                  pattern: playwright-blob-report-*

            - name: Merge Playwright HTML report
              run: npx playwright merge-reports --reporter html ./all-blob-reports

            - name: Upload merged Playwright HTML report
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: playwright-report
                  path: playwright-report/
                  if-no-files-found: ignore
