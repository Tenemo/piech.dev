name: Production Playwright E2E

on:
    workflow_dispatch:
        inputs:
            base_url:
                description: Production site URL to test
                required: false
                default: 'https://piech.dev'
                type: string
            deploy_branch:
                description: Netlify deploy branch
                required: false
                default: ''
                type: string
            deploy_context:
                description: Netlify deploy context
                required: false
                default: ''
                type: string
            deploy_id:
                description: Netlify deploy ID
                required: false
                default: ''
                type: string
            deploy_url:
                description: Netlify deploy URL
                required: false
                default: ''
                type: string
            published_url:
                description: Netlify published URL
                required: false
                default: ''
                type: string

permissions:
    contents: read

concurrency:
    group: production-playwright-e2e
    cancel-in-progress: false

jobs:
    playwright:
        name: Production Playwright E2E
        runs-on: ubuntu-latest
        timeout-minutes: 30
        env:
            PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || 'https://piech.dev' }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22.x'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install --with-deps

            - name: Capture deploy metadata
              run: |
                  {
                    echo "## Production deploy under test"
                    echo ""
                    echo "- Base URL: $PLAYWRIGHT_BASE_URL"
                    echo "- Netlify deploy ID: ${{ inputs.deploy_id }}"
                    echo "- Netlify deploy branch: ${{ inputs.deploy_branch }}"
                    echo "- Netlify deploy context: ${{ inputs.deploy_context }}"
                    echo "- Netlify deploy URL: ${{ inputs.deploy_url }}"
                    echo "- Netlify published URL: ${{ inputs.published_url }}"
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Run Playwright tests against production
              run: npx playwright test

            - name: Upload Playwright HTML report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: production-playwright-report
                  path: playwright-report/
                  if-no-files-found: ignore

            - name: Upload Playwright raw results
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: production-playwright-test-results
                  path: test-results/
                  if-no-files-found: ignore
